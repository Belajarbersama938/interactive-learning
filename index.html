<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Perubahan Energi</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
}

html,body{
width:100%;
height:100%;
overflow:hidden;
background:#fff;
}

iframe{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
border:none;
}

#fullscreenBtn{
position:fixed;
top:15px;
right:15px;
z-index:9999;
padding:10px 18px;
border:none;
border-radius:10px;
background:#1976d2;
color:#fff;
font-size:15px;
cursor:pointer;
}
</style>
</head>

<body>

<button id="fullscreenBtn">⛶ Fullscreen</button>

<iframe
src="https://www.canva.com/design/DAHNliwSaCk/WlvWYSfxbGDf3ol9Xr8HUw/view?embed"
allowfullscreen
allow="fullscreen">
</iframe>

<script>
document.getElementById("fullscreenBtn").onclick=function(){
document.documentElement.requestFullscreen();
}
</script>

</body>
</html>
