<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Multimedia Pembelajaran Interaktif</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;overflow:hidden;font-family:Segoe UI,Arial,sans-serif}
body{background:linear-gradient(180deg,#79c0f6 0%,#cfeeff 45%,#f7fbff 100%);position:relative}
.sun{position:absolute;top:25px;right:35px;width:82px;height:82px;border-radius:50%;background:#ffd54f;box-shadow:0 0 28px #ffd54f}
.sun:before{content:"";position:absolute;width:60px;height:60px;background:#fff;border-radius:50%;top:12px;left:-10px;opacity:.9}
/* clouds */
.cloud{position:absolute;background:#fff;border-radius:50px;opacity:.95;filter:drop-shadow(0 8px 10px rgba(0,0,0,.08));animation:float linear infinite}
.cloud:before,.cloud:after{content:"";position:absolute;background:#fff;border-radius:50%}
.cloud:before{width:42px;height:42px;left:18px;top:-18px}
.cloud:after{width:58px;height:58px;right:16px;top:-26px}
.c1{width:120px;height:42px;top:60px;left:-180px;animation-duration:42s}
.c2{width:155px;height:50px;top:135px;left:-220px;animation-duration:56s;animation-delay:-10s}
.c3{width:100px;height:36px;top:215px;left:-170px;animation-duration:48s;animation-delay:-20s}
@keyframes float{from{transform:translateX(0)}to{transform:translateX(calc(100vw + 400px))}}

.header{text-align:center;padding:18px 20px 8px;position:relative;z-index:5}
.header h1{display:inline-block;padding:10px 28px;border-radius:18px;background:linear-gradient(135deg,#0d47a1,#1976d2,#42a5f5);color:#fff;font-weight:900;font-size:clamp(28px,3vw,42px);text-shadow:1px 2px 4px rgba(0,0,0,.35);box-shadow:0 10px 25px rgba(13,71,161,.35);transition:.35s}
.header h1:hover{transform:translateY(-3px) scale(1.03);box-shadow:0 16px 40px rgba(13,71,161,.45)}
.header h2{margin-top:12px;display:inline-block;padding:6px 18px;background:rgba(255,255,255,.9);border-radius:40px;color:#0b4d84;font-weight:800;transition:.3s}
.header h2:hover{background:#0b4d84;color:#fff}
.wrapper{position:absolute;left:50%;transform:translateX(-50%);top:118px;width:min(96%,1400px);height:calc(100% - 140px);padding:14px;background:rgba(255,255,255,.28);backdrop-filter:blur(10px);border-radius:28px;box-shadow:0 18px 50px rgba(0,0,0,.18)}
.viewer{width:100%;height:100%;overflow:hidden;border-radius:20px;background:#fff}
iframe{width:100%;height:100%;border:none}
</style>
</head>
<body>
<div class="sun"></div>
<div class="cloud c1"></div>
<div class="cloud c2"></div>
<div class="cloud c3"></div>

<div class="header">
<h1>✨ Multimedia Pembelajaran Interaktif ✨</h1><br>
<h2>Perubahan Energi</h2>
</div>

<div class="wrapper">
<div class="viewer">
<iframe src="https://www.canva.com/design/DAHNliwSaCk/WlvWYSfxbGDf3ol9Xr8HUw/view?embed" allowfullscreen loading="eager"></iframe>
</div>
</div>
</body>
</html>
